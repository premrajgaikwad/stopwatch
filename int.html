<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stopwatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="int.css" />
</head>
<body>

  <div class="card">
    <div class="label">Stopwatch</div>
    <div class="time" id="display">00:00<span>.00</span></div>
    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="lapBtn" disabled>Lap</button>
      <button id="resetBtn">Reset</button>
    </div>
    <div class="laps" id="laps"></div>
  </div>

  <script src="int.js"></script>
</body>
</html>
